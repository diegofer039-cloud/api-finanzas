<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Personales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>💰 Finanzas Personales</h1>
        <p class="subtitle">Controla tus ingresos y gastos</p>
    </header>

    <main>
        <section id="dashboard">
            <div class="card balance" id="balance-card">
                <span class="card-label">Balance Total</span>
                <span class="card-value" id="total-balance">$0</span>
            </div>
            <div class="card income">
                <span class="card-label">Ingresos</span>
                <span class="card-value" id="total-ingresos">$0</span>
            </div>
            <div class="card expense">
                <span class="card-label">Gastos</span>
                <span class="card-value" id="total-gastos">$0</span>
            </div>
        </section>

        <section id="form-section">
            <h2>Nueva Transacción</h2>
            <form id="transaction-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="type">Tipo</label>
                        <select id="type" required>
                            <option value="ingreso">Ingreso</option>
                            <option value="gasto">Gasto</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amount">Monto</label>
                        <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <input type="text" id="category" placeholder="ej: comida, salario" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label for="description">Descripción</label>
                        <input type="text" id="description" placeholder="Opcional">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end;gap:8px">
                        <button type="submit" class="btn-primary">Agregar</button>
                        <button type="button" class="btn-secondary" id="cancel-edit" style="display:none">Cancelar</button>
                    </div>
                </div>
            </form>
        </section>

        <section id="filters-section">
            <h2>Transacciones</h2>
            <div class="filters">
                <select id="filter-type">
                    <option value="">Todos</option>
                    <option value="ingreso">Solo Ingresos</option>
                    <option value="gasto">Solo Gastos</option>
                </select>
                <input type="text" id="filter-category" placeholder="Filtrar por categoría">
                <input type="date" id="filter-from">
                <span>a</span>
                <input type="date" id="filter-to">
                <button class="btn-secondary" id="apply-filters">Filtrar</button>
            </div>
        </section>

        <section id="list-section">
            <div id="transactions-list">
                <p class="empty">Cargando...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
