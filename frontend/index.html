<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Personales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>◆</text></svg>">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <div class="app-shell">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div>
                <div class="sidebar-brand">
                    <div class="sidebar-brand-mark">◆</div>
                    <div class="sidebar-brand-text">
                        <span class="sidebar-brand-name">finanzas</span>
                        <span class="sidebar-brand-sub">personal</span>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <button class="side-btn active" data-tab="dashboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Dashboard
                    </button>
                    <button class="side-btn" data-tab="budgets">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Presupuestos
                    </button>
                    <button class="side-btn" data-tab="categories">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Categorías
                    </button>
                    <button class="side-btn" data-tab="goals">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                        Metas
                    </button>
                </nav>
            </div>
            <div class="sidebar-bottom">
                <button class="side-btn export-btn" id="export-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Exportar CSV
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <!-- TAB: DASHBOARD -->
            <section id="tab-dashboard" class="tab-content active">
                <div class="dashboard-grid" id="dashboard-cards">
                    <div class="stat-card balance">
                        <span class="stat-label">Balance total</span>
                        <span class="stat-value" id="total-balance">$0</span>
                    </div>
                    <div class="stat-card income">
                        <span class="stat-label">Ingresos del año</span>
                        <span class="stat-value" id="total-ingresos">$0</span>
                    </div>
                    <div class="stat-card expense">
                        <span class="stat-label">Gastos del año</span>
                        <span class="stat-value" id="total-gastos">$0</span>
                    </div>
                </div>

                <!-- CHART -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3 id="chart-title">Evolución anual</h3>
                        <div class="chart-controls">
                            <div class="chart-view-toggle">
                                <button class="view-btn active" data-view="year">Año</button>
                                <button class="view-btn" data-view="month">Mes</button>
                                <button class="view-btn" data-view="week">Semana</button>
                                <button class="view-btn" data-view="day">Día</button>
                            </div>
                            <select id="chart-range" class="chart-select" aria-label="Rango del gráfico"></select>
                            <input type="date" id="chart-date" class="chart-date" style="display:none" aria-label="Fecha del gráfico">
                        </div>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="line-chart"></canvas>
                        <div class="chart-empty" id="chart-empty">Sin datos suficientes</div>
                    </div>
                </div>

                <!-- SAVINGS GOAL SNEAK -->
                <div class="savings-preview" id="savings-preview">
                    <div class="savings-preview-header">
                        <h3>Meta de ahorro</h3>
                        <button class="btn-ghost-sm" onclick="_switchTab('goals')">Ver todas →</button>
                    </div>
                    <div class="savings-preview-body" id="savings-preview-body">
                        <div class="loading-state"><div class="spinner"></div></div>
                    </div>
                </div>

                <!-- TRANSACTIONS -->
                <div class="section-bar">
                    <h3>Transacciones</h3>
                    <div class="filter-row">
                        <select id="filter-type" aria-label="Filtrar por tipo">
                            <option value="">Todas</option>
                            <option value="ingreso">Ingresos</option>
                            <option value="gasto">Gastos</option>
                        </select>
                        <input type="text" id="filter-search" placeholder="Buscar…" aria-label="Buscar transacciones">
                        <input type="text" id="filter-category" placeholder="Categoría" aria-label="Filtrar por categoría">
                        <input type="date" id="filter-from" aria-label="Fecha desde">
                        <span class="sep">—</span>
                        <input type="date" id="filter-to" aria-label="Fecha hasta">
                        <button class="btn-ghost-sm" id="apply-filters">Filtrar</button>
                    </div>
                </div>

                <button class="tx-form-toggle" id="tx-form-toggle" aria-label="Agregar transacción">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Nueva transacción</span>
                </button>

                <form id="transaction-form" class="tx-form collapsed" novalidate>
                    <div class="form-row">
                        <div class="field w-auto">
                            <label>Tipo</label>
                            <div class="toggle-group">
                                <button type="button" class="toggle-btn active" data-value="ingreso">Ingreso</button>
                                <button type="button" class="toggle-btn" data-value="gasto">Gasto</button>
                            </div>
                            <input type="hidden" id="type" value="ingreso">
                        </div>
                        <div class="field">
                            <label for="amount">Monto</label>
                            <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="field">
                            <label for="category">Categoría</label>
                            <input type="text" id="category" placeholder="ej: Comida" list="category-list" required>
                            <datalist id="category-list"></datalist>
                        </div>
                        <div class="field">
                            <label for="date">Fecha</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="field">
                            <label for="description">Descripción</label>
                            <input type="text" id="description" placeholder="Opcional">
                        </div>
                        <div class="field w-auto" style="justify-content:flex-end">
                            <button type="submit" class="btn-primary" id="submit-btn">Agregar</button>
                            <button type="button" class="btn-ghost-sm" id="cancel-edit" style="display:none">Cancelar</button>
                        </div>
                    </div>
                </form>

                <div id="transactions-list" class="tx-list">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
            </section>

            <!-- TAB: BUDGETS -->
            <section id="tab-budgets" class="tab-content">
                <div class="section-bar">
                    <h3>Presupuestos mensuales</h3>
                    <button class="btn-primary" id="add-budget-btn">+ Nuevo</button>
                </div>

                <form id="budget-form" class="budget-form" style="display:none" novalidate>
                    <div class="form-row">
                        <div class="field">
                            <input type="text" id="budget-category" placeholder="Categoría" aria-label="Categoría del presupuesto" required>
                        </div>
                        <div class="field">
                            <input type="number" id="budget-amount" min="1" placeholder="Presupuesto $" aria-label="Monto del presupuesto" required>
                        </div>
                        <div class="field">
                            <input type="month" id="budget-month" aria-label="Mes del presupuesto" required>
                        </div>
                        <div class="field w-auto">
                            <button type="submit" class="btn-primary">Guardar</button>
                            <button type="button" class="btn-ghost-sm" id="cancel-budget">Cancelar</button>
                        </div>
                    </div>
                </form>

                <div id="budgets-list" class="budgets-grid">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
            </section>

            <!-- TAB: CATEGORIES -->
            <section id="tab-categories" class="tab-content">
                <div class="section-bar">
                    <h3>Resumen por categoría</h3>
                    <select id="cat-month-filter" class="filter-select" aria-label="Filtrar por mes">
                        <option value="">Todos los meses</option>
                    </select>
                </div>
                <div class="cat-layout">
                    <div id="categories-list" class="cat-list">
                        <div class="loading-state"><div class="spinner"></div></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-wrap">
                            <canvas id="pie-chart"></canvas>
                            <div class="chart-empty" id="pie-empty">Agrega gastos para ver el gráfico</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TAB: GOALS -->
            <section id="tab-goals" class="tab-content">
                <div class="section-bar">
                    <h3>Metas de ahorro</h3>
                    <button class="btn-primary" id="add-goal-btn">+ Nueva meta</button>
                </div>

                <form id="goal-form" class="goal-form" style="display:none" novalidate>
                    <div class="form-row">
                        <div class="field">
                            <input type="text" id="goal-name" placeholder="Nombre (ej: Viaje, Casa)" aria-label="Nombre de la meta" required>
                        </div>
                        <div class="field">
                            <input type="number" id="goal-target" min="1" placeholder="Meta $" aria-label="Monto objetivo" required>
                        </div>
                        <div class="field">
                            <input type="number" id="goal-current" min="0" placeholder="Inicial $" aria-label="Monto inicial" value="0">
                        </div>
                        <div class="field">
                            <input type="date" id="goal-deadline" placeholder="Fecha límite (opcional)" aria-label="Fecha límite">
                        </div>
                        <div class="field w-auto">
                            <button type="submit" class="btn-primary">Guardar</button>
                            <button type="button" class="btn-ghost-sm" id="cancel-goal">Cancelar</button>
                        </div>
                    </div>
                </form>

                <div id="goals-list" class="goals-grid">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
            </section>

        </main>
    </div>

    <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

    <dialog id="confirm-modal" class="confirm-modal">
        <div class="confirm-modal-content">
            <p id="confirm-message" class="confirm-message"></p>
            <div class="confirm-actions">
                <button class="btn-ghost-sm" id="confirm-cancel" type="button">Cancelar</button>
                <button class="btn-danger" id="confirm-ok" type="button">Eliminar</button>
            </div>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
